<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrition Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2EC;
    --surface: #FDFCF9;
    --border: #E2DDD4;
    --text: #1C1A16;
    --muted: #8A8478;
    --accent: #2D5A3D;
    --accent-light: #EAF0EC;
    --warn: #B85C2A;
    --warn-light: #FBF0EA;
    --protein: #2D5A3D;
    --carbs: #2A4A7F;
    --fat: #7A4A1A;
    --cal: #1C1A16;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .app {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--accent); font-style: italic; }

  .date-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Day type toggle */
  .day-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
  }

  .day-btn {
    flex: 1;
    padding: 8px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .day-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Macro ring summary */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1.25rem;
    align-items: center;
  }

  .ring-wrap {
    position: relative;
    width: 80px;
    height: 80px;
    flex-shrink: 0;
  }

  .ring-wrap svg { transform: rotate(-90deg); }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-cal { font-size: 16px; font-weight: 500; color: var(--text); line-height: 1; }
  .ring-sub { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px; }

  .macro-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .macro-item { }
  .macro-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
  .macro-val { font-size: 15px; font-weight: 500; color: var(--text); }
  .macro-target { font-size: 10px; color: var(--muted); }

  .macro-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }

  .macro-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Meal sections */
  .meal-section {
    margin-bottom: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
  }

  .meal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }

  .meal-header.has-items { border-bottom-color: var(--border); }

  .meal-left { display: flex; align-items: center; gap: 10px; }

  .meal-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }

  .meal-name { font-size: 13px; font-weight: 500; }
  .meal-time { font-size: 11px; color: var(--muted); }

  .meal-right { display: flex; align-items: center; gap: 10px; }
  .meal-kcal { font-size: 12px; color: var(--muted); }

  .add-btn {
    width: 24px; height: 24px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .add-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  .meal-items { padding: 0; }

  .food-item {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.2s ease;
    gap: 8px;
  }

  .food-item:last-child { border-bottom: none; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .food-name { font-size: 13px; color: var(--text); flex: 1; }
  .food-macros { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .food-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .food-cal { font-size: 12px; font-weight: 500; color: var(--text); }

  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--border); font-size: 14px; padding: 0;
    transition: color 0.15s; line-height: 1;
  }
  .del-btn:hover { color: var(--warn); }

  /* Input area */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .meal-select-row {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .meal-select-btn {
    flex: 1;
    padding: 8px 4px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    border-right: 1px solid var(--border);
    font-weight: 500;
  }

  .meal-select-btn:last-child { border-right: none; }
  .meal-select-btn.selected { background: var(--accent-light); color: var(--accent); }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 0;
  }

  .food-input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 0.875rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 52px;
    max-height: 120px;
    line-height: 1.4;
  }

  .food-input::placeholder { color: var(--muted); }

  .send-btn {
    margin: 8px;
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #214530; }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  .input-hint {
    font-size: 11px;
    color: var(--muted);
    padding: 0 1rem 0.75rem;
  }

  /* Loading state */
  .loading-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    display: none;
  }

  .loading-bar.active { display: block; }

  .loading-fill {
    height: 100%;
    width: 30%;
    background: var(--accent);
    border-radius: 1px;
    animation: loading 1.2s ease-in-out infinite;
  }

  @keyframes loading {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(450%); }
  }

  /* Feedback / flags */
  .flag-card {
    border-radius: 12px;
    padding: 0.75rem 1rem;
    margin-bottom: 0.75rem;
    font-size: 12px;
    line-height: 1.5;
    display: none;
  }

  .flag-card.visible { display: block; animation: slideIn 0.2s ease; }
  .flag-card.warn { background: var(--warn-light); border: 1px solid #EAC5AF; color: var(--warn); }
  .flag-card.good { background: var(--accent-light); border: 1px solid #B5D0BC; color: var(--accent); }

  .flag-title { font-weight: 500; margin-bottom: 3px; }

  /* Progress section */
  .progress-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 0.75rem;
  }

  .progress-label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; margin-bottom: 6px;
  }

  .progress-name { color: var(--muted); }
  .progress-nums { color: var(--text); font-weight: 500; }

  .progress-track {
    height: 6px; background: var(--border);
    border-radius: 3px; overflow: visible; position: relative;
    margin-bottom: 10px;
  }

  .progress-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.5s ease;
    position: relative;
  }

  .progress-target-line {
    position: absolute;
    right: 0; top: -3px; bottom: -3px;
    width: 2px;
    background: white;
    border-radius: 1px;
  }

  .reset-btn {
    display: block;
    width: 100%;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    margin-top: 1rem;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: var(--warn); color: var(--warn); }

  .empty-state {
    text-align: center;
    padding: 1.5rem 1rem;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }

  .empty-icon {
    font-size: 24px;
    margin-bottom: 8px;
    opacity: 0.4;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">eat<span>well</span></div>
    <div class="date-label" id="date-display"></div>
  </header>

  <!-- Day type -->
  <div class="day-toggle">
    <button class="day-btn active" id="btn-training" onclick="setDayType('training')">Training day</button>
    <button class="day-btn" id="btn-rest" onclick="setDayType('rest')">Rest day</button>
  </div>

  <!-- Summary ring -->
  <div class="summary-card">
    <div class="ring-wrap">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="34" fill="none" stroke="#E2DDD4" stroke-width="6"/>
        <circle id="cal-ring" cx="40" cy="40" r="34" fill="none" stroke="#2D5A3D" stroke-width="6"
          stroke-dasharray="213.6" stroke-dashoffset="213.6" stroke-linecap="round"
          style="transition: stroke-dashoffset 0.5s ease"/>
      </svg>
      <div class="ring-center">
        <div class="ring-cal" id="total-cal">0</div>
        <div class="ring-sub">kcal</div>
      </div>
    </div>
    <div class="macro-grid">
      <div class="macro-item">
        <div class="macro-label">Protein</div>
        <div class="macro-val"><span id="total-protein">0</span>g</div>
        <div class="macro-target" id="protein-target-label">of 135g</div>
        <div class="macro-bar"><div class="macro-fill" id="protein-bar" style="background:#2D5A3D;width:0%"></div></div>
      </div>
      <div class="macro-item">
        <div class="macro-label">Carbs</div>
        <div class="macro-val"><span id="total-carbs">0</span>g</div>
        <div class="macro-target" id="carbs-target-label">of 180g</div>
        <div class="macro-bar"><div class="macro-fill" id="carbs-bar" style="background:#2A4A7F;width:0%"></div></div>
      </div>
      <div class="macro-item">
        <div class="macro-label">Fat</div>
        <div class="macro-val"><span id="total-fat">0</span>g</div>
        <div class="macro-target" id="fat-target-label">of 65g</div>
        <div class="macro-bar"><div class="macro-fill" id="fat-bar" style="background:#7A4A1A;width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- Flag card -->
  <div class="flag-card" id="flag-card">
    <div class="flag-title" id="flag-title"></div>
    <div id="flag-body"></div>
  </div>

  <!-- Meal sections -->
  <div id="meals-container"></div>

  <!-- Input area -->
  <div class="input-section">
    <div class="meal-select-row" id="meal-select-row"></div>
    <div class="loading-bar" id="loading-bar"><div class="loading-fill"></div></div>
    <div class="input-row">
      <textarea class="food-input" id="food-input"
        placeholder="Tell me what you ate… e.g. 'scrambled eggs with spinach and 2 slices brown bread'"
        rows="1"
        onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="logFood()" title="Log food">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 13V3M8 3L4 7M8 3L12 7" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Just describe what you ate naturally — I'll estimate the nutrition</div>
  </div>

  <button class="reset-btn" onclick="resetDay()">Reset today's log</button>

</div>

<script>
const MEALS = [
  { id: 'breakfast', name: 'Breakfast', time: '8:00am', color: '#D4872A' },
  { id: 'snack1',    name: 'Snack 1',   time: '11:30am', color: '#7A9E4A' },
  { id: 'lunch',     name: 'Lunch',     time: '3:00pm',  color: '#2D5A3D' },
  { id: 'snack2',    name: 'Snack 2',   time: '5:30pm',  color: '#7A9E4A' },
  { id: 'dinner',    name: 'Dinner',    time: '8:00pm',  color: '#2A4A7F' },
];

const TARGETS = {
  training: { cal: 2050, protein: 135, carbs: 180, fat: 65 },
  rest:      { cal: 1900, protein: 120, carbs: 160, fat: 60 },
};

const SYSTEM_PROMPT = `You are a nutrition tracker for a specific person. Here is their profile:
- Weight: 79.5kg, goal: 75kg by May at 0.5kg/week
- Strength trains 4x/week (Mon/Tue/Thu/Fri), walks 40 mins daily
- Training day targets: 2050 kcal, 135g protein, 180g carbs, 65g fat
- Rest day targets: 1900 kcal, 120g protein, 160g carbs, 60g fat

Their meal plan rules (from their nutritionist):
- Breakfast: protein-focused (eggs, Greek yogurt, chicken options)
- Lunch only: can include carbs (1 chapati, 3-4 tbsp rice, 2 slices bread, etc.)
- Dinner: protein + veg only, NO carbs
- 2 snacks/day: one protein, one carb
- No sugar, no artificial sweeteners (stevia ok), no dates/mangoes/grapes/figs/lychee
- Yogurt: max 2 tbsp per meal
- Cheese: once a week only
- Rice/mutton/beef: max twice a week
- Fruit: one serving per day only
- Water: 3L on training days, 2.5L on rest days

The user will tell you what they ate. You MUST respond with ONLY a valid JSON object, no markdown, no explanation, no preamble. Format:
{
  "items": [
    {
      "name": "descriptive food name",
      "calories": number,
      "protein": number,
      "carbs": number,
      "fat": number
    }
  ],
  "flags": [
    {
      "type": "warn" or "good",
      "message": "short specific note about compliance or praise"
    }
  ]
}

Be accurate with nutrition estimates. Use realistic portion sizes. If multiple foods are mentioned, create separate items for each. Flags should be specific to their plan rules — flag violations (carbs at dinner, too much yogurt, forbidden fruit, etc.) or praise good choices.`;

let dayType = 'training';
let selectedMeal = 'breakfast';
let log = {};

MEALS.forEach(m => log[m.id] = []);

function setDayType(type) {
  dayType = type;
  document.getElementById('btn-training').classList.toggle('active', type === 'training');
  document.getElementById('btn-rest').classList.toggle('active', type === 'rest');
  updateTargetLabels();
  updateSummary();
}

function updateTargetLabels() {
  const t = TARGETS[dayType];
  document.getElementById('protein-target-label').textContent = `of ${t.protein}g`;
  document.getElementById('carbs-target-label').textContent = `of ${t.carbs}g`;
  document.getElementById('fat-target-label').textContent = `of ${t.fat}g`;
}

function init() {
  const now = new Date();
  document.getElementById('date-display').textContent = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

  const hour = now.getHours();
  if (hour >= 6 && hour < 10) selectedMeal = 'breakfast';
  else if (hour >= 10 && hour < 13) selectedMeal = 'snack1';
  else if (hour >= 13 && hour < 17) selectedMeal = 'lunch';
  else if (hour >= 17 && hour < 19) selectedMeal = 'snack2';
  else selectedMeal = 'dinner';

  renderMealSelectRow();
  renderMeals();
  updateSummary();
  updateTargetLabels();

  const ta = document.getElementById('food-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });
}

function renderMealSelectRow() {
  const row = document.getElementById('meal-select-row');
  row.innerHTML = MEALS.map(m => `
    <button class="meal-select-btn ${selectedMeal === m.id ? 'selected' : ''}"
      onclick="selectMeal('${m.id}')">${m.name}</button>
  `).join('');
}

function selectMeal(id) {
  selectedMeal = id;
  renderMealSelectRow();
}

function renderMeals() {
  const container = document.getElementById('meals-container');
  container.innerHTML = MEALS.map(m => {
    const items = log[m.id];
    const mealCal = items.reduce((s, i) => s + i.calories, 0);
    return `
      <div class="meal-section">
        <div class="meal-header ${items.length ? 'has-items' : ''}" onclick="selectMeal('${m.id}')">
          <div class="meal-left">
            <div class="meal-dot" style="background:${m.color}"></div>
            <div>
              <div class="meal-name">${m.name}</div>
              <div class="meal-time">${m.time}</div>
            </div>
          </div>
          <div class="meal-right">
            ${mealCal > 0 ? `<div class="meal-kcal">${Math.round(mealCal)} kcal</div>` : ''}
            <button class="add-btn" onclick="event.stopPropagation();selectMeal('${m.id}');document.getElementById('food-input').focus()">+</button>
          </div>
        </div>
        <div class="meal-items">
          ${items.length === 0
            ? `<div class="empty-state"><div class="empty-icon">○</div>Nothing logged yet</div>`
            : items.map((item, idx) => `
              <div class="food-item">
                <div>
                  <div class="food-name">${item.name}</div>
                  <div class="food-macros">${Math.round(item.protein)}g protein · ${Math.round(item.carbs)}g carbs · ${Math.round(item.fat)}g fat</div>
                </div>
                <div class="food-right">
                  <div class="food-cal">${Math.round(item.calories)}</div>
                  <button class="del-btn" onclick="deleteItem('${m.id}', ${idx})">×</button>
                </div>
              </div>
            `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function updateSummary() {
  const t = TARGETS[dayType];
  let totCal = 0, totP = 0, totC = 0, totF = 0;
  MEALS.forEach(m => {
    log[m.id].forEach(item => {
      totCal += item.calories;
      totP += item.protein;
      totC += item.carbs;
      totF += item.fat;
    });
  });

  document.getElementById('total-cal').textContent = Math.round(totCal);
  document.getElementById('total-protein').textContent = Math.round(totP);
  document.getElementById('total-carbs').textContent = Math.round(totC);
  document.getElementById('total-fat').textContent = Math.round(totF);

  const calPct = Math.min(totCal / t.cal, 1);
  const circumference = 213.6;
  document.getElementById('cal-ring').style.strokeDashoffset = circumference - (calPct * circumference);
  document.getElementById('cal-ring').style.stroke = totCal > t.cal * 1.1 ? '#B85C2A' : '#2D5A3D';

  document.getElementById('protein-bar').style.width = Math.min(totP / t.protein * 100, 100) + '%';
  document.getElementById('carbs-bar').style.width = Math.min(totC / t.carbs * 100, 100) + '%';
  document.getElementById('fat-bar').style.width = Math.min(totF / t.fat * 100, 100) + '%';
}

function showFlag(flags) {
  const card = document.getElementById('flag-card');
  if (!flags || flags.length === 0) { card.classList.remove('visible'); return; }
  const f = flags[0];
  card.className = `flag-card visible ${f.type}`;
  document.getElementById('flag-title').textContent = f.type === 'warn' ? 'Plan note' : 'Good choice';
  document.getElementById('flag-body').textContent = f.message;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); logFood(); }
}

async function logFood() {
  const input = document.getElementById('food-input');
  const text = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('send-btn');
  const loader = document.getElementById('loading-bar');
  btn.disabled = true;
  loader.classList.add('active');
  input.value = '';
  input.style.height = 'auto';

  const mealName = MEALS.find(m => m.id === selectedMeal)?.name || selectedMeal;
  const userMessage = `Meal: ${mealName} (${dayType} day)\nFood eaten: ${text}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userMessage }]
      })
    });

    const data = await response.json();
    const rawText = data.content?.find(b => b.type === 'text')?.text || '';

    let parsed;
    try {
      const clean = rawText.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch {
      throw new Error('Could not parse response');
    }

    if (parsed.items && parsed.items.length > 0) {
      parsed.items.forEach(item => {
        log[selectedMeal].push({
          name: item.name,
          calories: item.calories || 0,
          protein: item.protein || 0,
          carbs: item.carbs || 0,
          fat: item.fat || 0,
        });
      });
      showFlag(parsed.flags);
      renderMeals();
      updateSummary();
    }

  } catch (err) {
    console.error(err);
    showFlag([{ type: 'warn', message: 'Could not log that item — please try again.' }]);
  }

  btn.disabled = false;
  loader.classList.remove('active');
}

function deleteItem(mealId, idx) {
  log[mealId].splice(idx, 1);
  renderMeals();
  updateSummary();
}

function resetDay() {
  if (!confirm('Reset today\'s log?')) return;
  MEALS.forEach(m => log[m.id] = []);
  document.getElementById('flag-card').classList.remove('visible');
  renderMeals();
  updateSummary();
}

init();
</script>
</body>
</html>
